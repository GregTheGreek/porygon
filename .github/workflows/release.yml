name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches manifest version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest="$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")"
          echo "tag=$tag manifest=$manifest"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::Tag v$tag does not match plugin.json version $manifest"
            exit 1
          fi

      - name: Validate manifests
        run: python3 .github/scripts/validate_manifests.py

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
