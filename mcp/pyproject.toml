[project]
name = "poryml"
version = "0.1.0"
description = "Deterministic primitives for AI-augmented pokeemerald ROM hacking (binary blockdata I/O, project parsing, build/debug, image pipeline)."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.2.0",
]

[project.optional-dependencies]
# Pulled in for the image pipeline (Phase 3+). Kept optional so the foundation
# (binary I/O + project parsing) installs with no native/image deps.
imaging = [
    "Pillow>=10.0.0",
    "numpy>=1.24.0",
]
dev = [
    "pytest>=8.0.0",
]

[project.scripts]
poryml = "poryml.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/poryml"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
